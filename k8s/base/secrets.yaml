---
# External service secrets (AWS Parameter Store references)
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-parameter-store
  labels:
    app.kubernetes.io/name: zendapag
    app.kubernetes.io/component: secrets
spec:
  provider:
    aws:
      service: ParameterStore
      region: us-west-2
      auth:
        secretRef:
          accessKeyID:
            name: aws-secret
            key: access-key-id
          secretAccessKey:
            name: aws-secret
            key: secret-access-key

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: zendapag-external-config
  labels:
    app.kubernetes.io/name: zendapag
    app.kubernetes.io/component: secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: SecretStore
  target:
    name: zendapag-external-config
    creationPolicy: Owner
  data:
  - secretKey: redis-password
    remoteRef:
      key: /zendapag/redis/password
  - secretKey: kafka-bootstrap-servers
    remoteRef:
      key: /zendapag/kafka/bootstrap-servers
  - secretKey: monitoring-endpoints
    remoteRef:
      key: /zendapag/monitoring/endpoints