global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'zendapag-api'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['zendapag-api:8080']

  - job_name: 'zendapag-worker'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['zendapag-worker:8081']