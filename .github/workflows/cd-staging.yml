name: Deploy to Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:

env:
  AWS_REGION: us-west-2
  EKS_CLUSTER_NAME: zendapag-staging
  DOCKER_REGISTRY: ${{ secrets.DOCKER_REGISTRY_URL }}
  NAMESPACE: zendapag-staging

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build application
        run: |
          ./mvnw clean package -DskipTests \
            -Dspring.profiles.active=staging

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/zendapag
          tags: |
            type=ref,event=branch
            type=sha,prefix=staging-
            type=raw,value=staging-latest

      - name: Build and push API image
        uses: docker/build-push-action@v5
        id: build-api
        with:
          context: .
          file: ./zendapag-api/Dockerfile
          push: true
          tags: ${{ env.DOCKER_REGISTRY }}/zendapag-api:staging-${{ github.sha }},${{ env.DOCKER_REGISTRY }}/zendapag-api:staging-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Build and push Worker image
        uses: docker/build-push-action@v5
        id: build-worker
        with:
          context: .
          file: ./zendapag-worker/Dockerfile
          push: true
          tags: ${{ env.DOCKER_REGISTRY }}/zendapag-worker:staging-${{ github.sha }},${{ env.DOCKER_REGISTRY }}/zendapag-worker:staging-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Sign images
        run: |
          echo "Signing container images..."
          # Add cosign signing here if needed

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER_NAME }}

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: '3.12.0'

      - name: Add Helm repositories
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo update

      - name: Create namespace
        run: |
          kubectl create namespace ${{ env.NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -

      - name: Create database secret
        run: |
          kubectl create secret generic database-secret \
            --from-literal=url="${{ secrets.STAGING_DATABASE_URL }}" \
            --from-literal=username="${{ secrets.STAGING_DATABASE_USERNAME }}" \
            --from-literal=password="${{ secrets.STAGING_DATABASE_PASSWORD }}" \
            --namespace=${{ env.NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create JWT secret
        run: |
          kubectl create secret generic jwt-secret \
            --from-literal=secret="${{ secrets.JWT_SECRET }}" \
            --namespace=${{ env.NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create PIX certificates secret
        run: |
          kubectl create secret generic pix-certs \
            --from-literal=private-key="${{ secrets.PIX_CERT_PRIVATE_KEY }}" \
            --from-literal=certificate="${{ secrets.PIX_CERT_CERTIFICATE }}" \
            --from-literal=ca-certificate="${{ secrets.PIX_CERT_CA }}" \
            --namespace=${{ env.NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy with Helm
        run: |
          helm upgrade --install zendapag-staging ./k8s/helm/zendapag \
            --namespace ${{ env.NAMESPACE }} \
            --set image.api.repository=${{ env.DOCKER_REGISTRY }}/zendapag-api \
            --set image.api.tag=staging-${{ github.sha }} \
            --set image.worker.repository=${{ env.DOCKER_REGISTRY }}/zendapag-worker \
            --set image.worker.tag=staging-${{ github.sha }} \
            --set environment=staging \
            --set replicaCount.api=2 \
            --set replicaCount.worker=2 \
            --set resources.api.requests.cpu=200m \
            --set resources.api.requests.memory=512Mi \
            --set resources.worker.requests.cpu=200m \
            --set resources.worker.requests.memory=512Mi \
            --wait --timeout=10m

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/zendapag-api --namespace=${{ env.NAMESPACE }} --timeout=300s
          kubectl rollout status deployment/zendapag-worker --namespace=${{ env.NAMESPACE }} --timeout=300s

      - name: Run health checks
        run: |
          # Wait for pods to be ready
          kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=zendapag-api --namespace=${{ env.NAMESPACE }} --timeout=300s
          kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=zendapag-worker --namespace=${{ env.NAMESPACE }} --timeout=300s

          # Get service endpoints
          API_ENDPOINT=$(kubectl get service zendapag-api --namespace=${{ env.NAMESPACE }} -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')

          # Health check with retry
          for i in {1..10}; do
            if curl -f http://$API_ENDPOINT/actuator/health; then
              echo "✅ Health check passed"
              break
            else
              echo "⏳ Health check attempt $i failed, retrying..."
              sleep 30
            fi
            if [ $i -eq 10 ]; then
              echo "❌ Health check failed after 10 attempts"
              exit 1
            fi
          done

  rollback:
    runs-on: ubuntu-latest
    needs: deploy
    if: failure()

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER_NAME }}

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: '3.12.0'

      - name: Rollback deployment
        run: |
          echo "🔄 Rolling back deployment due to failure..."
          helm rollback zendapag-staging --namespace=${{ env.NAMESPACE }}

      - name: Verify rollback
        run: |
          kubectl rollout status deployment/zendapag-api --namespace=${{ env.NAMESPACE }} --timeout=300s
          kubectl rollout status deployment/zendapag-worker --namespace=${{ env.NAMESPACE }} --timeout=300s

  notify:
    runs-on: ubuntu-latest
    needs: [deploy, rollback]
    if: always()

    steps:
      - name: Notify Slack on success
        if: needs.deploy.result == 'success'
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_CHANNEL: 'deployments'
          SLACK_COLOR: good
          SLACK_MESSAGE: |
            ✅ Staging deployment successful!
            Environment: Staging
            Commit: ${{ github.sha }}
            Author: ${{ github.actor }}
            Images:
            • API: staging-${{ github.sha }}
            • Worker: staging-${{ github.sha }}

      - name: Notify Slack on failure
        if: needs.deploy.result == 'failure' || needs.rollback.result == 'success'
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_CHANNEL: 'deployments'
          SLACK_COLOR: danger
          SLACK_MESSAGE: |
            ❌ Staging deployment failed!
            Environment: Staging
            Commit: ${{ github.sha }}
            Author: ${{ github.actor }}

            ${{ needs.rollback.result == 'success' && '🔄 Automatic rollback completed' || '⚠️  Manual intervention required' }}

  smoke-tests:
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER_NAME }}

      - name: Run smoke tests
        run: |
          # Get API endpoint
          API_ENDPOINT=$(kubectl get service zendapag-api --namespace=${{ env.NAMESPACE }} -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')

          echo "🧪 Running smoke tests against: http://$API_ENDPOINT"

          # Test health endpoints
          curl -f http://$API_ENDPOINT/actuator/health
          curl -f http://$API_ENDPOINT/actuator/info

          # Test API endpoints (add your specific tests here)
          # curl -f -H "Content-Type: application/json" -d '{"username":"test","password":"test"}' http://$API_ENDPOINT/api/v1/auth/login

          echo "✅ All smoke tests passed"