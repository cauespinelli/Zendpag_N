name: Continuous Integration

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]
  push:
    branches: [main, develop]

env:
  JAVA_VERSION: '17'
  MAVEN_OPTS: -Dhttp.keepAlive=false -Dmaven.wagon.http.pool=false -Dmaven.wagon.httpconnectionManager.ttlSeconds=120

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      java: ${{ steps.changes.outputs.java }}
      docker: ${{ steps.changes.outputs.docker }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect changes
        uses: dorny/paths-filter@v2
        id: changes
        with:
          filters: |
            java:
              - '**/*.java'
              - '**/pom.xml'
              - '.github/workflows/ci.yml'
            docker:
              - '**/Dockerfile'
              - 'docker-compose.yml'

  test:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.java == 'true'

    strategy:
      matrix:
        java-version: [17]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: zendapag_test
          POSTGRES_USER: zendapag
          POSTGRES_PASSWORD: zendapag123
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Run tests with coverage
        run: |
          ./mvnw clean verify \
            -Dspring.profiles.active=test \
            -Dspring.datasource.url=jdbc:postgresql://localhost:5432/zendapag_test \
            -Dspring.datasource.username=zendapag \
            -Dspring.datasource.password=zendapag123 \
            -Dspring.data.redis.host=localhost \
            -Dspring.data.redis.port=6379 \
            jacoco:report

      - name: Check coverage threshold
        run: |
          ./mvnw jacoco:check -Djacoco.haltOnFailure=true

      - name: SonarCloud Scan
        if: env.SONAR_TOKEN != ''
        run: |
          ./mvnw sonar:sonar \
            -Dsonar.projectKey=zendapag_zendapag-platform \
            -Dsonar.organization=zendapag \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          files: ./target/site/jacoco/jacoco.xml
          fail_ci_if_error: true
          verbose: true

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: |
            **/target/surefire-reports/**/*.xml
            **/target/failsafe-reports/**/*.xml

  build:
    runs-on: ubuntu-latest
    needs: [changes, test]
    if: always() && (needs.test.result == 'success' || needs.test.result == 'skipped')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build application
        run: ./mvnw clean compile -DskipTests

      - name: Package application
        run: ./mvnw package -DskipTests

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jar-artifacts-${{ github.sha }}
          path: |
            zendapag-api/target/*.jar
            zendapag-worker/target/*.jar
          retention-days: 1

  docker-build:
    runs-on: ubuntu-latest
    needs: [changes, build]
    if: needs.changes.outputs.docker == 'true' || needs.changes.outputs.java == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: jar-artifacts-${{ github.sha }}

      - name: Build Docker images
        run: |
          docker build -t zendapag-api:${{ github.sha }} -f zendapag-api/Dockerfile .
          docker build -t zendapag-worker:${{ github.sha }} -f zendapag-worker/Dockerfile .

      - name: Test Docker images
        run: |
          # Test image can start
          docker run --rm -d --name api-test -p 8080:8080 zendapag-api:${{ github.sha }}
          sleep 30
          docker exec api-test curl -f http://localhost:8080/actuator/health || exit 1
          docker stop api-test

          docker run --rm -d --name worker-test -p 8081:8081 zendapag-worker:${{ github.sha }}
          sleep 30
          docker exec worker-test curl -f http://localhost:8081/actuator/health || exit 1
          docker stop worker-test

  quality-gate:
    runs-on: ubuntu-latest
    needs: [test, build, docker-build]
    if: always()

    steps:
      - name: Check job results
        run: |
          echo "Test result: ${{ needs.test.result }}"
          echo "Build result: ${{ needs.build.result }}"
          echo "Docker build result: ${{ needs.docker-build.result }}"

          if [[ "${{ needs.test.result }}" == "failure" ]]; then
            echo "❌ Tests failed"
            exit 1
          fi

          if [[ "${{ needs.build.result }}" == "failure" ]]; then
            echo "❌ Build failed"
            exit 1
          fi

          if [[ "${{ needs.docker-build.result }}" == "failure" ]]; then
            echo "❌ Docker build failed"
            exit 1
          fi

          echo "✅ All quality gates passed"

  notify:
    runs-on: ubuntu-latest
    needs: [quality-gate]
    if: always() && github.event_name == 'pull_request'

    steps:
      - name: Notify Slack on success
        if: needs.quality-gate.result == 'success'
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_CHANNEL: 'ci-cd'
          SLACK_COLOR: good
          SLACK_MESSAGE: |
            ✅ CI Pipeline passed for PR #${{ github.event.number }}
            Branch: ${{ github.head_ref }}
            Author: ${{ github.actor }}
            Commit: ${{ github.event.pull_request.head.sha }}

      - name: Notify Slack on failure
        if: needs.quality-gate.result == 'failure'
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_CHANNEL: 'ci-cd'
          SLACK_COLOR: danger
          SLACK_MESSAGE: |
            ❌ CI Pipeline failed for PR #${{ github.event.number }}
            Branch: ${{ github.head_ref }}
            Author: ${{ github.actor }}
            Commit: ${{ github.event.pull_request.head.sha }}

            Please check the workflow logs for details.