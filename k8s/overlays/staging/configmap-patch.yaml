---
apiVersion: v1
kind: ConfigMap
metadata:
  name: zendapag-config
  labels:
    app.kubernetes.io/name: zendapag
    app.kubernetes.io/component: config
data:
  # Override base configuration for staging
  LOGGING_LEVEL_COM_ZENDAPAG: "DEBUG"
  LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY: "DEBUG"

  # Staging-specific Kafka settings
  KAFKA_CONSUMER_AUTO_OFFSET_RESET: "earliest"
  KAFKA_CONSUMER_MAX_POLL_RECORDS: "50"
  KAFKA_PRODUCER_BATCH_SIZE: "16384"

  # Database settings for staging
  SPRING_JPA_SHOW_SQL: "true"
  SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL: "true"

  # Monitoring settings
  MANAGEMENT_METRICS_DISTRIBUTION_PERCENTILES_HTTP_SERVER_REQUESTS: "0.5,0.9,0.95,0.99"