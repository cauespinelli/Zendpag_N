---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: zendapag-api-pdb
  labels:
    app.kubernetes.io/name: zendapag
    app.kubernetes.io/component: api
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: zendapag
      app.kubernetes.io/component: api

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: zendapag-worker-pdb
  labels:
    app.kubernetes.io/name: zendapag
    app.kubernetes.io/component: worker
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: zendapag
      app.kubernetes.io/component: worker