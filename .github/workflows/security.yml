name: Security Scans

on:
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  dependency-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Cache OWASP database
        uses: actions/cache@v4
        with:
          path: ~/OWASP-Dependency-Check
          key: ${{ runner.os }}-owasp-db

      - name: Run OWASP Dependency Check
        run: |
          ./mvnw org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=7 \
            -DsuppressionsLocation=owasp-suppressions.xml

      - name: Upload OWASP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-reports
          path: target/dependency-check-report.html

      - name: Parse SARIF report
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: target/dependency-check-report.sarif

  codeql-analysis:
    name: CodeQL Analysis
    runs-on: ubuntu-latest

    strategy:
      matrix:
        language: ['java']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build application
        run: ./mvnw compile -DskipTests

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/java
            p/owasp-top-ten
            p/cwe-top-25
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

  docker-security:
    name: Docker Security Scan
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.changed_files, 'Dockerfile')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build application
        run: ./mvnw package -DskipTests

      - name: Build Docker images
        run: |
          docker build -t zendapag-api:security-scan -f zendapag-api/Dockerfile .
          docker build -t zendapag-worker:security-scan -f zendapag-worker/Dockerfile .

      - name: Run Trivy vulnerability scanner - API
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'zendapag-api:security-scan'
          format: 'sarif'
          output: 'trivy-api-results.sarif'

      - name: Run Trivy vulnerability scanner - Worker
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'zendapag-worker:security-scan'
          format: 'sarif'
          output: 'trivy-worker-results.sarif'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-api-results.sarif'

      - name: Upload Trivy Worker scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-worker-results.sarif'

      - name: Run Hadolint - API Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: zendapag-api/Dockerfile
          format: sarif
          output-file: hadolint-api-results.sarif
          no-fail: true

      - name: Run Hadolint - Worker Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: zendapag-worker/Dockerfile
          format: sarif
          output-file: hadolint-worker-results.sarif
          no-fail: true

      - name: Upload Hadolint API results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: hadolint-api-results.sarif

      - name: Upload Hadolint Worker results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: hadolint-worker-results.sarif

  secrets-scan:
    name: Secrets Detection
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run GitLeaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE}}

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: main
          head: HEAD
          extra_args: --debug --only-verified

  infrastructure-scan:
    name: Infrastructure Security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Checkov on Kubernetes manifests
        uses: bridgecrewio/checkov-action@master
        with:
          directory: k8s/
          quiet: true
          soft_fail: true
          framework: kubernetes
          output_format: sarif
          output_file_path: checkov-k8s-results.sarif

      - name: Run Checkov on Dockerfile
        uses: bridgecrewio/checkov-action@master
        with:
          directory: ./
          quiet: true
          soft_fail: true
          framework: dockerfile
          output_format: sarif
          output_file_path: checkov-docker-results.sarif

      - name: Upload Checkov K8s results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov-k8s-results.sarif

      - name: Upload Checkov Docker results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov-docker-results.sarif

  license-scan:
    name: License Compliance
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate license report
        run: |
          ./mvnw org.codehaus.mojo:license-maven-plugin:aggregate-third-party-report

      - name: Upload license report
        uses: actions/upload-artifact@v4
        with:
          name: license-report
          path: target/site/aggregate-third-party-report.html

  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [dependency-check, codeql-analysis, semgrep, docker-security, secrets-scan, infrastructure-scan, license-scan]
    if: always()

    steps:
      - name: Generate Security Summary
        run: |
          echo "## 🔒 Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Check results of each job
          if [ "${{ needs.dependency-check.result }}" == "success" ]; then
            echo "✅ **OWASP Dependency Check**: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **OWASP Dependency Check**: Failed" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.codeql-analysis.result }}" == "success" ]; then
            echo "✅ **CodeQL Analysis**: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **CodeQL Analysis**: Failed" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.semgrep.result }}" == "success" ]; then
            echo "✅ **Semgrep SAST**: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Semgrep SAST**: Failed" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.docker-security.result }}" == "success" ]; then
            echo "✅ **Docker Security**: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Docker Security**: Issues found" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.secrets-scan.result }}" == "success" ]; then
            echo "✅ **Secrets Detection**: Clean" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Secrets Detection**: Potential secrets found" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.infrastructure-scan.result }}" == "success" ]; then
            echo "✅ **Infrastructure Scan**: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Infrastructure Scan**: Issues found" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.license-scan.result }}" == "success" ]; then
            echo "✅ **License Compliance**: Compliant" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **License Compliance**: Issues found" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📋 **View detailed results in the Security tab**" >> $GITHUB_STEP_SUMMARY

      - name: Notify security team on critical findings
        if: |
          needs.dependency-check.result == 'failure' ||
          needs.secrets-scan.result == 'failure'
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SECURITY_SLACK_WEBHOOK }}
          SLACK_CHANNEL: 'security-alerts'
          SLACK_COLOR: danger
          SLACK_MESSAGE: |
            🚨 **Critical Security Issues Detected**

            Repository: ${{ github.repository }}
            Branch: ${{ github.ref }}
            Commit: ${{ github.sha }}

            Failed Scans:
            ${{ needs.dependency-check.result == 'failure' && '• OWASP Dependency Check' || '' }}
            ${{ needs.secrets-scan.result == 'failure' && '• Secrets Detection' || '' }}

            🔍 **Action Required**: Please review the security findings immediately.

  policy-enforcement:
    name: Security Policy Enforcement
    runs-on: ubuntu-latest
    needs: [dependency-check, secrets-scan]
    if: github.event_name == 'pull_request'

    steps:
      - name: Block PR on critical security issues
        if: |
          needs.dependency-check.result == 'failure' ||
          needs.secrets-scan.result == 'failure'
        run: |
          echo "❌ Pull Request blocked due to critical security issues"
          echo "Please resolve the following before merging:"

          if [ "${{ needs.dependency-check.result }}" == "failure" ]; then
            echo "• High/Critical CVEs found in dependencies"
          fi

          if [ "${{ needs.secrets-scan.result }}" == "failure" ]; then
            echo "• Potential secrets detected in code"
          fi

          exit 1

      - name: Security gate passed
        if: |
          needs.dependency-check.result == 'success' &&
          needs.secrets-scan.result == 'success'
        run: |
          echo "✅ All critical security gates passed"
          echo "PR can proceed to review"