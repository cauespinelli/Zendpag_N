# SonarQube Project Configuration
sonar.projectKey=zendapag_zendapag-platform
sonar.organization=zendapag
sonar.projectName=Zendapag PIX Payment Platform

# Source code settings
sonar.sources=zendapag-api/src/main/java,zendapag-core/src/main/java,zendapag-worker/src/main/java,zendapag-common/src/main/java
sonar.tests=zendapag-api/src/test/java,zendapag-core/src/test/java,zendapag-worker/src/test/java,zendapag-common/src/test/java

# Language settings
sonar.java.source=17
sonar.java.target=17

# Coverage settings
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml,*/target/site/jacoco/jacoco.xml
sonar.junit.reportPaths=target/surefire-reports,*/target/surefire-reports

# Exclusions
sonar.exclusions=**/*Application.java,**/dto/**,**/entity/**,**/config/**
sonar.test.exclusions=**/target/**

# Quality Gate settings
sonar.qualitygate.wait=true

# Analysis settings
sonar.sourceEncoding=UTF-8
sonar.scm.provider=git

# Security hotspots and issues
sonar.java.libraries=target/dependency/*.jar,*/target/dependency/*.jar