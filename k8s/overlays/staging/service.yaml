---
apiVersion: v1
kind: Service
metadata:
  name: zendapag-api
  labels:
    app.kubernetes.io/name: zendapag
    app.kubernetes.io/component: api
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
spec:
  type: LoadBalancer
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
    - name: management
      port: 8081
      targetPort: management
      protocol: TCP
  selector:
    app.kubernetes.io/name: zendapag
    app.kubernetes.io/component: api

---
apiVersion: v1
kind: Service
metadata:
  name: zendapag-api-internal
  labels:
    app.kubernetes.io/name: zendapag
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
    - name: management
      port: 8081
      targetPort: management
      protocol: TCP
  selector:
    app.kubernetes.io/name: zendapag
    app.kubernetes.io/component: api

---
apiVersion: v1
kind: Service
metadata:
  name: zendapag-worker
  labels:
    app.kubernetes.io/name: zendapag
    app.kubernetes.io/component: worker
spec:
  type: ClusterIP
  ports:
    - name: management
      port: 8081
      targetPort: management
      protocol: TCP
  selector:
    app.kubernetes.io/name: zendapag
    app.kubernetes.io/component: worker

---
# Headless service for StatefulSet-like behavior if needed
apiVersion: v1
kind: Service
metadata:
  name: zendapag-api-headless
  labels:
    app.kubernetes.io/name: zendapag
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: zendapag
    app.kubernetes.io/component: api