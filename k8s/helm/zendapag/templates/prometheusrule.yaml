{{- if and .Values.monitoring.enabled .Values.monitoring.prometheusRule.enabled }}
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "zendapag.fullname" . }}-alerts
  labels:
    {{- include "zendapag.labels" . | nindent 4 }}
    {{- with .Values.monitoring.prometheusRule.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  groups:
  - name: zendapag.api.alerts
    rules:
    - alert: ZendapagAPIHighErrorRate
      expr: |
        (
          rate(http_requests_total{job="{{ include "zendapag.fullname" . }}-api", status=~"5.."}[5m])
          /
          rate(http_requests_total{job="{{ include "zendapag.fullname" . }}-api"}[5m])
        ) * 100 > {{ .Values.monitoring.prometheusRule.rules.apiErrorRate.threshold | default 5 }}
      for: {{ .Values.monitoring.prometheusRule.rules.apiErrorRate.duration | default "2m" }}
      labels:
        severity: {{ .Values.monitoring.prometheusRule.rules.apiErrorRate.severity | default "warning" }}
        service: zendapag-api
      annotations:
        summary: "High error rate detected in Zendapag API"
        description: "Zendapag API error rate is {{ "{{ $value }}" }}% for the last 5 minutes"

    - alert: ZendapagAPIHighLatency
      expr: |
        histogram_quantile(0.95,
          rate(http_request_duration_seconds_bucket{job="{{ include "zendapag.fullname" . }}-api"}[5m])
        ) > {{ .Values.monitoring.prometheusRule.rules.apiLatency.threshold | default 1 }}
      for: {{ .Values.monitoring.prometheusRule.rules.apiLatency.duration | default "5m" }}
      labels:
        severity: {{ .Values.monitoring.prometheusRule.rules.apiLatency.severity | default "warning" }}
        service: zendapag-api
      annotations:
        summary: "High latency detected in Zendapag API"
        description: "Zendapag API 95th percentile latency is {{ "{{ $value }}" }}s"

    - alert: ZendapagAPILowThroughput
      expr: |
        rate(http_requests_total{job="{{ include "zendapag.fullname" . }}-api"}[5m]) < {{ .Values.monitoring.prometheusRule.rules.apiThroughput.threshold | default 10 }}
      for: {{ .Values.monitoring.prometheusRule.rules.apiThroughput.duration | default "5m" }}
      labels:
        severity: {{ .Values.monitoring.prometheusRule.rules.apiThroughput.severity | default "warning" }}
        service: zendapag-api
      annotations:
        summary: "Low throughput detected in Zendapag API"
        description: "Zendapag API throughput is {{ "{{ $value }}" }} requests/second"

    - alert: ZendapagAPIPodCrashLooping
      expr: |
        increase(kube_pod_container_status_restarts_total{
          namespace="{{ .Release.Namespace }}",
          pod=~"{{ include "zendapag.fullname" . }}-api-.*"
        }[15m]) > 0
      for: 0m
      labels:
        severity: critical
        service: zendapag-api
      annotations:
        summary: "Zendapag API pod is crash looping"
        description: "Pod {{ "{{ $labels.pod }}" }} is crash looping"

  - name: zendapag.worker.alerts
    rules:
    - alert: ZendapagWorkerKafkaConsumerLag
      expr: |
        kafka_consumer_lag_sum{job="{{ include "zendapag.fullname" . }}-worker"} > {{ .Values.monitoring.prometheusRule.rules.kafkaLag.threshold | default 1000 }}
      for: {{ .Values.monitoring.prometheusRule.rules.kafkaLag.duration | default "5m" }}
      labels:
        severity: {{ .Values.monitoring.prometheusRule.rules.kafkaLag.severity | default "warning" }}
        service: zendapag-worker
      annotations:
        summary: "High Kafka consumer lag in Zendapag Worker"
        description: "Kafka consumer lag is {{ "{{ $value }}" }} messages"

    - alert: ZendapagWorkerProcessingErrors
      expr: |
        rate(kafka_consumer_failed_total{job="{{ include "zendapag.fullname" . }}-worker"}[5m]) > {{ .Values.monitoring.prometheusRule.rules.processingErrors.threshold | default 0.1 }}
      for: {{ .Values.monitoring.prometheusRule.rules.processingErrors.duration | default "2m" }}
      labels:
        severity: {{ .Values.monitoring.prometheusRule.rules.processingErrors.severity | default "warning" }}
        service: zendapag-worker
      annotations:
        summary: "High processing error rate in Zendapag Worker"
        description: "Worker processing error rate is {{ "{{ $value }}" }} errors/second"

    - alert: ZendapagWorkerPodCrashLooping
      expr: |
        increase(kube_pod_container_status_restarts_total{
          namespace="{{ .Release.Namespace }}",
          pod=~"{{ include "zendapag.fullname" . }}-worker-.*"
        }[15m]) > 0
      for: 0m
      labels:
        severity: critical
        service: zendapag-worker
      annotations:
        summary: "Zendapag Worker pod is crash looping"
        description: "Pod {{ "{{ $labels.pod }}" }} is crash looping"

  - name: zendapag.infrastructure.alerts
    rules:
    - alert: ZendapagHighMemoryUsage
      expr: |
        (
          container_memory_working_set_bytes{
            namespace="{{ .Release.Namespace }}",
            pod=~"{{ include "zendapag.fullname" . }}-(api|worker)-.*"
          }
          /
          container_spec_memory_limit_bytes{
            namespace="{{ .Release.Namespace }}",
            pod=~"{{ include "zendapag.fullname" . }}-(api|worker)-.*"
          }
        ) * 100 > {{ .Values.monitoring.prometheusRule.rules.memoryUsage.threshold | default 80 }}
      for: {{ .Values.monitoring.prometheusRule.rules.memoryUsage.duration | default "5m" }}
      labels:
        severity: {{ .Values.monitoring.prometheusRule.rules.memoryUsage.severity | default "warning" }}
        service: zendapag
      annotations:
        summary: "High memory usage in Zendapag pod"
        description: "Pod {{ "{{ $labels.pod }}" }} memory usage is {{ "{{ $value }}" }}%"

    - alert: ZendapagHighCPUUsage
      expr: |
        rate(container_cpu_usage_seconds_total{
          namespace="{{ .Release.Namespace }}",
          pod=~"{{ include "zendapag.fullname" . }}-(api|worker)-.*"
        }[5m]) * 100 > {{ .Values.monitoring.prometheusRule.rules.cpuUsage.threshold | default 80 }}
      for: {{ .Values.monitoring.prometheusRule.rules.cpuUsage.duration | default "5m" }}
      labels:
        severity: {{ .Values.monitoring.prometheusRule.rules.cpuUsage.severity | default "warning" }}
        service: zendapag
      annotations:
        summary: "High CPU usage in Zendapag pod"
        description: "Pod {{ "{{ $labels.pod }}" }} CPU usage is {{ "{{ $value }}" }}%"

    - alert: ZendapagPodNotReady
      expr: |
        kube_pod_status_ready{
          condition="false",
          namespace="{{ .Release.Namespace }}",
          pod=~"{{ include "zendapag.fullname" . }}-(api|worker)-.*"
        } > 0
      for: {{ .Values.monitoring.prometheusRule.rules.podNotReady.duration | default "5m" }}
      labels:
        severity: {{ .Values.monitoring.prometheusRule.rules.podNotReady.severity | default "warning" }}
        service: zendapag
      annotations:
        summary: "Zendapag pod is not ready"
        description: "Pod {{ "{{ $labels.pod }}" }} has been not ready for more than 5 minutes"

    - alert: ZendapagPVCAlmostFull
      expr: |
        (
          kubelet_volume_stats_used_bytes{
            namespace="{{ .Release.Namespace }}",
            persistentvolumeclaim=~"{{ include "zendapag.fullname" . }}-.*"
          }
          /
          kubelet_volume_stats_capacity_bytes{
            namespace="{{ .Release.Namespace }}",
            persistentvolumeclaim=~"{{ include "zendapag.fullname" . }}-.*"
          }
        ) * 100 > {{ .Values.monitoring.prometheusRule.rules.pvcUsage.threshold | default 85 }}
      for: {{ .Values.monitoring.prometheusRule.rules.pvcUsage.duration | default "5m" }}
      labels:
        severity: {{ .Values.monitoring.prometheusRule.rules.pvcUsage.severity | default "warning" }}
        service: zendapag
      annotations:
        summary: "Zendapag PVC is almost full"
        description: "PVC {{ "{{ $labels.persistentvolumeclaim }}" }} is {{ "{{ $value }}" }}% full"

  {{- if .Values.monitoring.prometheusRule.customRules }}
  {{- range .Values.monitoring.prometheusRule.customRules }}
  - name: {{ .name }}
    {{- toYaml .rules | nindent 4 }}
  {{- end }}
  {{- end }}
{{- end }}