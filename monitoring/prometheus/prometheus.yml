global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'zendapag-production'
    environment: 'production'

# Alerting configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

# Load rules once and periodically evaluate them
rule_files:
  - "rules/*.yml"

# Scrape configurations
scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Zendapag API application
  - job_name: 'zendapag-api'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['zendapag-api:8081']
    scrape_interval: 10s
    scrape_timeout: 10s

  # Zendapag Worker application
  - job_name: 'zendapag-worker'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['zendapag-worker:8082']
    scrape_interval: 10s
    scrape_timeout: 10s

  # Kafka cluster metrics
  - job_name: 'kafka-exporter'
    static_configs:
      - targets: ['kafka-exporter:9308']
    scrape_interval: 30s

  # Kafka JMX metrics
  - job_name: 'kafka-jmx'
    static_configs:
      - targets: ['kafka-jmx-exporter:5556']
    scrape_interval: 30s

  # Kafka consumer lag metrics
  - job_name: 'kafka-lag-exporter'
    static_configs:
      - targets: ['kafka-lag-exporter:9999']
    scrape_interval: 15s

  # PostgreSQL metrics
  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']
    scrape_interval: 30s

  # Redis metrics
  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['redis-exporter:9121']
    scrape_interval: 30s

  # System metrics
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 15s

  # Container metrics
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    scrape_interval: 15s

  # Kafka brokers JMX (if enabled)
  - job_name: 'kafka-brokers'
    static_configs:
      - targets: ['kafka1:9999', 'kafka2:9999', 'kafka3:9999']
    metrics_path: '/metrics'
    scrape_interval: 30s
    scrape_timeout: 10s

  # Zookeeper metrics (if JMX enabled)
  - job_name: 'zookeeper'
    static_configs:
      - targets: ['zookeeper1:9999', 'zookeeper2:9999', 'zookeeper3:9999']
    metrics_path: '/metrics'
    scrape_interval: 30s
    scrape_timeout: 10s

  # Nginx metrics (if used as load balancer)
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx:9113']
    scrape_interval: 15s

# Recording rules for commonly used queries
recording_rules:
  - "recording_rules.yml"

# Remote write configuration for long-term storage (optional)
