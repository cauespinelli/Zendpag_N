# Production deployment with enhanced security and monitoring
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zendapag-api
  labels:
    app.kubernetes.io/name: zendapag
    app.kubernetes.io/component: api
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
  selector:
    matchLabels:
      app.kubernetes.io/name: zendapag
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zendapag
        app.kubernetes.io/component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8081"
        prometheus.io/path: "/actuator/prometheus"
        config.alpha.linkerd.io/proxy-cpu-request: "100m"
        config.alpha.linkerd.io/proxy-memory-request: "20Mi"
    spec:
      serviceAccountName: zendapag-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: zendapag-api:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1001
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: management
              containerPort: 8081
              protocol: TCP
          env:
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: zendapag-env-specific
                  key: SPRING_PROFILES_ACTIVE
            - name: JAVA_OPTS
              value: "-Xmx2g -Xms1g -XX:+UseG1GC -XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: zendapag-database
                  key: url
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: zendapag-database
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zendapag-database
                  key: password
            - name: APP_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: zendapag-jwt
                  key: secret
            - name: SPRING_DATA_REDIS_HOST
              value: "zendapag-redis.elasticache.amazonaws.com"
            - name: SPRING_DATA_REDIS_PORT
              value: "6379"
            - name: SPRING_DATA_REDIS_SSL
              value: "true"
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                secretKeyRef:
                  name: zendapag-external-config
                  key: kafka-bootstrap-servers
          envFrom:
            - configMapRef:
                name: zendapag-config
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: management
            initialDelaySeconds: 180
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: management
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /actuator/health
              port: management
            initialDelaySeconds: 90
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 18
          volumeMounts:
            - name: pix-certs
              mountPath: /app/certs
              readOnly: true
            - name: tmp
              mountPath: /tmp
            - name: logs
              mountPath: /app/logs
            - name: cache
              mountPath: /app/cache
      volumes:
        - name: pix-certs
          secret:
            secretName: zendapag-pix-certs
            defaultMode: 0400
        - name: tmp
          emptyDir: {}
        - name: logs
          emptyDir: {}
        - name: cache
          emptyDir:
            sizeLimit: 1Gi
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app.kubernetes.io/component
                operator: In
                values: ["api"]
            topologyKey: kubernetes.io/hostname
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 1
            preference:
              matchExpressions:
              - key: node-type
                operator: In
                values: ["application"]
      tolerations:
        - key: "application-nodes"
          operator: "Equal"
          value: "true"
          effect: "NoSchedule"
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/component: api

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: zendapag-api
  labels:
    app.kubernetes.io/name: zendapag
    app.kubernetes.io/component: api
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/ZendapagAPIRole

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: zendapag-api
  labels:
    app.kubernetes.io/name: zendapag
    app.kubernetes.io/component: api
rules:
- apiGroups: [""]
  resources: ["secrets", "configmaps"]
  verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: zendapag-api
  labels:
    app.kubernetes.io/name: zendapag
    app.kubernetes.io/component: api
subjects:
- kind: ServiceAccount
  name: zendapag-api
  namespace: zendapag-production
roleRef:
  kind: Role
  name: zendapag-api
  apiGroup: rbac.authorization.k8s.io