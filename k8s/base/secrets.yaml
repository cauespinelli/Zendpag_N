# This file contains SealedSecret templates
# Actual secrets should be sealed using kubeseal

---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: zendapag-database
  labels:
    app.kubernetes.io/name: zendapag
    app.kubernetes.io/component: secrets
spec:
  template:
    metadata:
      name: zendapag-database
      labels:
        app.kubernetes.io/name: zendapag
        app.kubernetes.io/component: secrets
    type: Opaque
  encryptedData:
    # These values should be encrypted with kubeseal
    # Example: echo -n "your-value" | kubeseal --raw --from-file=/dev/stdin --name=zendapag-database --namespace=zendapag-production
    url: AgBy3i4OJSWK+PiTySYZZA9rO43cGzEXample...
    username: AgBy3i4OJSWK+PiTySYZZA9rO43cGzEXample...
    password: AgBy3i4OJSWK+PiTySYZZA9rO43cGzEXample...

