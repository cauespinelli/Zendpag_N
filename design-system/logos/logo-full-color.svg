<svg width="180" height="48" viewBox="0 0 180 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Shape -->
  <defs>
    <linearGradient id="logo-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
  </defs>

  <!-- Icon Container -->
  <rect x="4" y="4" width="40" height="40" rx="10" fill="url(#logo-gradient)"/>

  <!-- Z Symbol -->
  <path d="M14,17 h16 l-10,10 h10 v3 h-16 l10,-10 h-10 z" fill="white" stroke="white" stroke-width="0.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Zen Dots -->
  <circle cx="32" cy="19" r="2" fill="white" opacity="0.9"/>
  <circle cx="32" cy="29" r="2" fill="white" opacity="0.9"/>

  <!-- Wordmark -->
  <text x="56" y="33" font-family="'Space Grotesk', 'Inter', sans-serif" font-weight="700" font-size="22" letter-spacing="-0.03em" fill="#1E293B">
    zendapag
  </text>

  <!-- Subtle Underline -->
  <rect x="56" y="38" width="88" height="2" rx="1" fill="#6366F1" opacity="0.3"/>
</svg>
